version: 2
updates:
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
      time: "12:00"
    groups:
      runtime-dependencies:
        dependency-type: "production"
      dev-dependencies:
        dependency-type: "development"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      time: "12:00"
    commit-message:
      prefix: "chore(docker)"
